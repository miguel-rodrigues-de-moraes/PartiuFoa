<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assents/icon/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <title>PartiuFOA - Login</title>
</head>
<body>
    <div class="caixalogin">
        <img src="img/partiuFOA.png">
        <h1>Login</h1>
        <form id="loginForm">
            <h2>Matrícula</h2>
            <input
            class="inputs"
            type="text"
            id="matricula"
            name="matricula"
            placeholder="Ex: 202600000"
            maxlength="9"
            pattern="[0-9]{9}"
            title="A matrícula deve conter exatamente 9 números."
            required>

            <h2>Senha</h2>
            <input
             class="inputs"
            type="password"
            id="senha"
            required
            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[#?!@$%^&*-]).{8,}$"
            placeholder="Ex: Senha123!"
            title="A senha deve ter no mínimo 8 caracteres, uma letra maiúscula, uma minúscula, um número e um caractere especial."
            required>

            <h3 style="cursor: pointer;">Esqueceu a senha?</h3>

            <button type="submit">Entrar</button>
        </form>
        <div class="texto">
        <h3 style="color:rgb(29, 29, 84);">Não possui conta?</h3> <h3 style="cursor: pointer;">Cadastre-se aqui!</h3>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
