<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="assents/icon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/login.css">

    <title>PartiuFOA | Login</title>
</head>
<body>

    <main class="login">
        <section class="login-caixa">

            <img class="login-logo" src="assents/img/img-header.png" alt="Logo PartiuFOA">

            <h1 class="login-titulo">Login</h1>

            <form class="login-formulario" id="formulario-login">

                <label class="login-label" for="campo-matricula">Matrícula</label>
                <input
                    class="login-campo"
                    type="text"
                    id="campo-matricula"
                    name="matricula"
                    placeholder="Ex: 202600000"
                    maxlength="9"
                    pattern="[0-9]{9}"
                    title="A matrícula deve conter exatamente 9 números."
                    required>

                <label class="login-label" for="campo-senha">Senha</label>
                <input
                    class="login-campo"
                    type="password"
                    id="campo-senha"
                    name="senha"
                    placeholder="Ex: Senha123!"
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[#?!@$%^&*-]).{8,}$"
                    title="A senha deve ter no mínimo 8 caracteres, uma letra maiúscula, uma minúscula, um número e um caractere especial."
                    required>

                <a class="login-link" href="#">Esqueceu a senha?</a>

                <button class="login-botao" type="submit">Entrar</button>

            </form>

            <div class="login-cadastro">
                <p class="login-texto">Não possui conta?</p>
                <a class="login-link" href="#">Cadastre-se aqui!</a>
            </div>

        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
