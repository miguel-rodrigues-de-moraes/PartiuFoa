<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>PartiuFoa</title>
    

    <link rel="shortcut icon" href="assents/icon/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <img id="img-logo" src="assents/img/img-header.png" alt="Logo">
        <button class="criar-carona">+ Criar Viagem</button>
        <button class="img-chat"><i class="fa-regular fa-comment-dots"></i></button>
        <button class="img-coracao"><i class="fa-regular fa-heart"></i></i></button>
        <button class="img-sino"><i class="fa-regular fa-bell"></i></button>
        <button class="img-perfil"><img src="assents/img/img-perfil.png" alt="Foto de Perfil"></button>
    </header>

    <main>
        <section id="pesquisa">
            <article class="pesquisa-cima">
                <div class="partida">
                    <button class="partiu"><i class="fa-solid fa-location-dot"></i><p>Ponto de Partida</p></button>
                    <button class="trocar"><i class="fa-solid fa-arrow-right-arrow-left"></i></button>
                </div>
                </article>
            <article class="pesquisa-baixo">
                <div class="container">
                    <button class="destino"></button>
                    <button class="horario"></button>
                    <button class="filtrar">Filtrar</button>
                </div>
            </article>
        </section>


    </main>
</body>
</html>
