<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>PartiuFoa</title>
    

    <link rel="shortcut icon" href="assents/icon/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <img id="img-logo" src="assents/img/img-header.png" alt="Logo">
        <button class="criar-carona">+ Criar Viagem</button>
        <button class="img-chat"><i class="fa-regular fa-comment-dots"></i></button>
        <button class="img-coracao"><i class="fa-regular fa-heart"></i></i></button>
        <button class="img-sino"><i class="fa-regular fa-bell"></i></button>
        <button class="img-perfil"><img src="assents/img/img-perfil.png" alt="Foto de Perfil"></button>
    </header>

    <main class="conteudo-principal">
        <section class="pesquisa">
            <div class="campo-busca">
            <i class="fa-solid fa-location-dot"></i>

            <input 
                type="text" 
                class="barra-de-busca"
                placeholder="Digite o ponto de partida"
            >
        </div>

        <div class="grupo-inferior">
            <div class="campo-destino">
                <i class="fa-solid fa-flag-checkered"></i>

                <input 
                    type="text" 
                    class="barra-destino"
                    placeholder="Opção de destino"
                >
            </div>

            <div class="campo-data">
                <i class="fa-solid fa-flag-checkered"></i>

                <input 
                    type="datetime-local" 
                    class="barra-data"
                    placeholder="Opção de destino"
                >
            </div>
        </div>
        </section>
    </main>
</body>
</html>
