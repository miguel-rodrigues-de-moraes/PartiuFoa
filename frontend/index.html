<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="shortcut icon" href="assents/icon/favicon.ico" type="image/x-icon">

    <title>PartiuFoa</title>
</head>

<body>
    <header>
        <img id="img-logo" src="assents/img/img-header.png" alt="Logo">
            <div class="icones">
            <button class="img-acess">
                <i class="fa-solid fa-wheelchair" style="color: aliceblue;"></i>
            </button>

            <button class="img-chat">
                <i class="fa-regular fa-comment-dots"></i>
            </button>

            <button class="img-sino">
                <i class="fa-regular fa-bell"></i>
            </button>

            <button class="img-perfil">
                <img src="assents/img/img-perfil.png" alt="Foto de Perfil">
            </button>
            </div>
    </header>

    <main>
        <section class="card">
        <section id="pesquisa">
            <i style="color: var(--texto-principal);" id="local" class="fa-solid fa-location-crosshairs"></i>
            <input type="textarea" placeholder="Ponto de Partida" class="partida">
            <button class="criar-carona">
            + Criar Viagem
        </button>
        </section>
        <section id="opcao">
            <i id="bussola" class="fa-regular fa-compass"></i>
            <select id="cidade" name="cidade">
                <option value="">Opções de Destino</option>
                <option value="olezzio">Campus Três Poços</option>
                <option value="barra-mansa">Campus Aterrado</option>
                <option value="hfoa">H-FOA</option>
                <option value="saindo">Saindo do campus</option>
            </select>
            <i id="relogio" class="fa-regular fa-clock"></i>
            <select id="horario" name="horario">
                <option value="">Opções de Horário</option>
                <option value="7">07.00h</option>
                <option value="8">08.00h</option>
                <option value="1230">12.30h</option>
                <option value="1830">18.30h</option>
                <option value="1930">19.30h</option>
            </select>
            <button class="filtrar">
                Filtrar
            </button>
        </section>
    </section>

        <section class="caixa1">
            <div class="perfil">
                <img class="fotoperfil" src="img/perfil1.png">
                <div class="informacao">
                    <h2>Maria</h2>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
